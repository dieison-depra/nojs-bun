<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No.JS - HTML-First Reactive Framework</title>
  <link rel="icon" href="favicon.ico">
  <meta name="description" content="Build dynamic, reactive web applications using nothing but HTML attributes. No build step. No virtual DOM. No transpiler.">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
<body state="{ version: NoJS.version }">

      <a route="/playground" t="shell.header.playground" lazy="ondemand"></a>
      <a route="/docs" t="shell.header.docs" lazy="priority"></a>
      <a href="https://github.com/ErickXavier/no-js" target="_blank" class="github-link">

      </a>
      <a route="/docs" class="nav-cta" t="shell.header.getStarted" lazy="priority"></a>
      <div class="lang-dropdown">
        <button class="lang-dropdown-btn" popovertarget="lang-menu">
          <span t="shell.flag"></span>
          <svg class="lang-chevron" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/></svg>

        <div id="lang-menu" class="lang-dropdown-menu" popover>
          <a on:click="NoJS.locale = 'en'" class-active="NoJS.locale === 'en'">🇺🇸 English</a>
          <a on:click="NoJS.locale = 'es'" class-active="NoJS.locale === 'es'">🇪🇸 Español</a>
          <a on:click="NoJS.locale = 'pt'" class-active="NoJS.locale === 'pt'">🇧🇷 Português</a>
          <a on:click="NoJS.locale = 'it'" class-active="NoJS.locale === 'it'">🇮🇹 Italiano</a>
          <a on:click="NoJS.locale = 'fr'" class-active="NoJS.locale === 'fr'">🇫🇷 Français</a>
        </div>
      </div>
    </nav>
  </header>

  <!-- ═══ Main Content (route outlet — file-based routing) ═══ -->
  <main route-view src="templates/" route-index="landing" i18n-ns class="content" transition="slide"></main>

  <!-- ═══ PageFooter: #0F172A bg, border-top #1E293B ═══ -->

    <div class="footer-inner">
      <div class="footer-row">
        <div class="footer-brand">
          <div class="footer-logo">
            <svg version="1.2" class="logo-img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" width="150" height="150">
    <defs>
        <mask id="bolt-border">
            <rect x="0" y="0" width="150" height="150" fill="white"/>
            <path d="m119.5 16h-54l-26 51h18l-27 67 73-67h-18z" fill="black" stroke="black" stroke-width="15" stroke-linejoin="miter"/>
        </mask>
    </defs>
    <style>.a{fill:none;stroke:#FFF;stroke-width:14}.b{fill:#0ea5e9}</style>

    <g mask="url(#bolt-border)">
        <path fill-rule="evenodd" class="a" d="m45 40l-35 35 35 35"/>
        <path fill-rule="evenodd" class="a" d="m105 40l35 35-35 35"/>
    </g>

    <path class="b" d="m119.5 16h-54l-26 51h18l-27 67 73-67h-18z"/>
</svg><span class="logo-title">No<span class="logo-dot">.</span>JS</span></div>
          <p class="footer-desc" t="shell.footer.desc"></p>
        </div>
        <div class="footer-cols">
          <div class="footer-col">
            <h4 t="shell.footer.resources"></h4>
            <a route="/docs" t="shell.footer.documentation"></a>
            <a route="/examples" t="shell.footer.examples"></a>
            <a route="/docs#cheatsheet" t="shell.footer.apiReference"></a>
            <a route="/playground" t="shell.footer.playground"></a>
            <a route="/faq" t="shell.footer.faq"></a>
            <a href="https://github.com/ErickXavier/no-js" target="_blank">GitHub</a>
          </div>
        </div>
      </div>
      <div class="footer-divider"></div>
      <div class="footer-bottom">
        <span t="shell.footer.license"></span>
        <span class="footer-version" bind="'No.JS v' + version"></span>
      </div>
    </div>

  <!-- ═══ Scripts ═══ -->
  <script src="https://unpkg.com/@erickxavier/no-js@latest/dist/iife/no.js"></script>
  <script>
    // ── Global NoJS configuration ──
    NoJS.config({
        debug: true,
        router: { mode: 'hash' },
    });

    // ── i18n setup (external locale files) ──
    NoJS.i18n({
      loadPath: 'locales/{locale}/{ns}.json',
      ns: ['shell'],
      persist: true,
      detectBrowser: true,
      defaultLocale: 'pt'
    });

    // ── Custom filters (for filter demos) ──
    NoJS.filter('highlight', function(text, term) {
      if (!term) return text;
      var re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      return text.replace(re, '<mark>$1</mark>');
    });
    NoJS.filter('initials', function(name) {
      if (!name) return '';
      return name.split(' ').map(function(w) { return w[0]; }).join('').toUpperCase();
    });
    NoJS.filter('timeAgo', function(date) {
      var seconds = Math.floor((new Date() - new Date(date)) / 1000);
      if (seconds < 60) return seconds + 's ago';
      if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
      if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
      return Math.floor(seconds / 86400) + 'd ago';
    });

    // ── Custom validators (for validation demos) ──
    NoJS.validator('phone', function(value) {
      return /^\+?[\d\s\-()]{7,15}$/.test(value);
    });
    NoJS.validator('strongPassword', function(value) {
      return value && value.length >= 8 && /[A-Z]/.test(value) && /[0-9]/.test(value) && /[^A-Za-z0-9]/.test(value);
    });
    NoJS.validator('url', function(value) {
      try { new URL(value); return true; } catch(e) { return false; }
    });

    // ── Custom directives (for directive demos) ──
    NoJS.directive('tooltip', {
      init: function(el, attrName, value) {
        var ctx = NoJS.findContext(el);
        if (ctx) {
          ctx.__watchers.push(function() { el.title = NoJS.evaluate(value, ctx); });
        } else { el.title = value; }
        el.style.cursor = 'help';
        el.style.borderBottom = '1px dashed currentColor';
      }
    });
    // ── Load playground engine on demand ──
    function _loadPlaygroundEngine() {
      if (location.hash.indexOf('/playground') === 0 || location.hash.indexOf('#/playground') === 0) {
        if (!document.getElementById('pg-engine')) {
          var s = document.createElement('script');
          s.id = 'pg-engine';
          s.src = 'playground/engine.js';
          document.body.appendChild(s);
        }
      }
    }
    window.addEventListener('hashchange', _loadPlaygroundEngine);
    _loadPlaygroundEngine();

    NoJS.directive('auto-focus', {
      init: function(el) { setTimeout(function() { el.focus(); }, 100); }
    });
    NoJS.directive('char-count', {
      init: function(el, attrName, maxStr) {
        var max = parseInt(maxStr) || 100;
        var counter = document.createElement('div');
        counter.style.cssText = 'font-size:0.75rem;color:var(--text-dim);text-align:right;margin-top:0.25rem;';
        el.parentNode.insertBefore(counter, el.nextSibling);
        function update() {
          var remaining = max - el.value.length;
          counter.textContent = remaining + ' / ' + max + ' characters remaining';
          counter.style.color = remaining < 10 ? 'var(--error)' : remaining < 30 ? 'var(--warning)' : 'var(--text-dim)';
        }
        el.addEventListener('input', update);
        update();
      }
    });

    // ── FAQ search filter ──
    document.addEventListener('click', function(e) {
      var summary = e.target.closest('.faq-question');
      if (!summary) return;
      var details = summary.parentElement;
      if (!details.open || details.classList.contains('faq-closing')) return;
      e.preventDefault();
      details.classList.add('faq-closing');
      var answer = details.querySelector('.faq-answer');
      answer.addEventListener('animationend', function() {
        details.open = false;
        details.classList.remove('faq-closing');
      }, { once: true });
    });

    NoJS.directive('faq-filter', {
      priority: 25,
      init: function(el, attrName, keysAttr) {
        var ctx = NoJS.findContext(el);
        var isGroup = !keysAttr;
        var keys = isGroup ? [] : keysAttr.split(',').map(function(k) { return k.trim(); });
        var currentState;

        function update() {
          var search = NoJS.evaluate('search', ctx);
          var visible;

          if (!search) {
            visible = true;
          } else if (isGroup) {
            var items = el.querySelectorAll('[faq-filter]:not(section)');
            visible = Array.prototype.some.call(items, function(item) {
              return item.style.display !== 'none';
            });
          } else {
            var term = search.toLowerCase();
            visible = keys.some(function(key) {
              var text = NoJS.evaluate("$i18n.t('" + key + "')", ctx);
              if (text && text.toLowerCase().indexOf(term) !== -1) return true;
              var answerKey = key.replace(/\.question$/, '.answer');
              var answer = NoJS.evaluate("$i18n.t('" + answerKey + "')", ctx);
              return answer && answer.toLowerCase().indexOf(term) !== -1;
            });
          }

          if (visible !== currentState) {
            el.style.display = visible ? '' : 'none';
            currentState = visible;
          }
        }

        ctx.$watch(update);
        if (!isGroup) update();
      }
    });
  </script>
</body>
</html>
